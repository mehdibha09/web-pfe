spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:${POSTGRES_DB:auth_service}}
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER:auth_user}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:auth_password}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Email Configuration (Brevo SMTP)
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:${BREVO_SMTP_USER:apikey}}
spring.mail.password=${MAIL_PASSWORD:${BREVO_SMTP_KEY:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:noreply@auth-service.local}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
