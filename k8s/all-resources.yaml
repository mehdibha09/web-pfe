# ============================================================================
# Consolidated Kubernetes Manifests for app-pfe
# ============================================================================
# This file consolidates all Kubernetes resources for the app-pfe application.
# Deploy all resources with: kubectl apply -f all-resources.yaml
# ============================================================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: app-pfe
  labels:
    name: app-pfe

---
# ConfigMap - Backend Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: app-pfe
  labels:
    app: backend
data:
  SPRING_PROFILES_ACTIVE: prod
  DB_HOST: postgres
  DB_PORT: '5432'
  DB_NAME: auth_service
  SERVER_PORT: '7070'

---
# Secret - Database Credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: app-pfe
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_USER: auth_user
  POSTGRES_PASSWORD: auth_password
  POSTGRES_DB: auth_service

---
# PostgreSQL (EXTERNAL) Service + Endpoints
# Points the in-cluster DNS name `postgres` to an external DB at 192.168.56.40:5432.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: app-pfe
  labels:
    app: postgres
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP

---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgres
  namespace: app-pfe
subsets:
  - addresses:
      - ip: 192.168.56.40
    ports:
      - name: postgres
        port: 5432
        protocol: TCP

---
# Auth Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: app-pfe
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        timestamp: 'will-be-set-by-pipeline'
    spec:
      imagePullSecrets:
        - name: nexus-regcred
      containers:
        - name: auth-service
          image: 192.168.56.30/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7070
              name: http
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: postgres-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 7070
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 7070
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'

---
# Auth Service - NodePort Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: app-pfe
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 7070
      targetPort: 7070
      nodePort: 30707
  type: NodePort

---
# Frontend Deployment
# NOTE: Ensure nginx.conf in frontend image listens on port 80
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: app-pfe
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        timestamp: 'will-be-set-by-pipeline'
    spec:
      imagePullSecrets:
        - name: nexus-regcred
      containers:
        - name: frontend
          image: 192.168.56.30/expense-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '200m'

---
# Frontend Service - NodePort
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: app-pfe
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
