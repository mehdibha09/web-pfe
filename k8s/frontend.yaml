---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: app-pfe
  labels:
    app: frontend
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
      annotations:
        timestamp: 'will-be-set-by-pipeline'

        # Monitoring
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9113'
        prometheus.io/path: '/metrics'

    spec:
      imagePullSecrets:
        - name: nexus-regcred

      tolerations:
        - operator: Exists
          effect: NoExecute
        - operator: Exists
          effect: NoSchedule

      containers:
        - name: frontend
          image: 192.168.56.30/frontend:latest
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: frontend-config
                optional: true
            - secretRef:
                name: frontend-secret
                optional: true

          ports:
            - containerPort: 80
              name: http

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '200m'

        # Monitoring container
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.1.0

          args:
            - -nginx.scrape-uri=http://localhost/nginx_status

          ports:
            - containerPort: 9113
              name: metrics
---
# Frontend Service - NodePort
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: app-pfe
  labels:
    app: frontend
spec:
  selector:
    app: frontend

  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080

    # Monitoring port
    - name: metrics
      port: 9113
      targetPort: 9113

  type: NodePort

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-pfe-ingress
  namespace: app-pfe

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 7070

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
