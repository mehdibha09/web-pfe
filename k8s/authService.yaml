---
# ConfigMap - Backend Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: app-pfe
  labels:
    app: backend
data:
  SPRING_PROFILES_ACTIVE: prod
  DB_HOST: postgres
  DB_PORT: '5432'
  DB_NAME: auth_service
  SERVER_PORT: '7070'

---
# Secret - Database Credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: app-pfe
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_USER: auth_user
  POSTGRES_PASSWORD: auth_password
  POSTGRES_DB: auth_service

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: app-pfe
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ['sh', '-c', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ['sh', '-c', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
            initialDelaySeconds: 20
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 5Gi

---
# PostgreSQL Service (Headless)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: app-pfe
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP

---
# Auth Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: app-pfe
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        timestamp: 'will-be-set-by-pipeline'
    spec:
      imagePullSecrets:
        - name: nexus-regcred
      containers:
        - name: auth-service
          image: 192.168.56.30/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7070
              name: http
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: postgres-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 7070
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 7070
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'

---
# Auth Service - ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: app-pfe
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 7070
      targetPort: 7070
  type: ClusterIP
